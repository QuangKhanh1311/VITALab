<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team — Research Lab</title>
  <meta name="description" content="Meet the researchers driving our mission forward. Browse our team of principal investigators, postdocs, PhD students, and more.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="VITAlogo.png">
  <link rel="apple-touch-icon" href="VITAlogo.png">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="members-page">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <h1>Our Team</h1>
        <p>Meet the researchers driving our mission forward</p>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="principal investigator">Principal Investigator</button>
        <button class="filter-tab" data-filter="postdoc">Postdoc</button>
        <button class="filter-tab" data-filter="phd student">PhD Student</button>
        <button class="filter-tab" data-filter="master student">Master Student</button>
        <button class="filter-tab" data-filter="undergraduate">Undergraduate</button>
        <button class="filter-tab" data-filter="alumni">Alumni</button>
      </div>

      <!-- Members Container -->
      <div id="membersContainer"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/nav.js?v=1.1"></script>
  <script src="js/members.js"></script>
</body>
</html>
