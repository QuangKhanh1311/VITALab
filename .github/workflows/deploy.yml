name: Deploy to Public Repo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout private repo (source)
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Deploy sang public repo
      - name: Push to public repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # --- Cấu hình ---
          PUBLIC_REPO="QuangKhanh1311/VITALab"
          DEPLOY_BRANCH="main"

          # --- Setup git ---
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # --- Clone public repo ---
          git clone --branch "$DEPLOY_BRANCH" "https://x-access-token:${DEPLOY_TOKEN}@github.com/${PUBLIC_REPO}.git" public_repo 2>/dev/null || {
            # Nếu branch chưa tồn tại, clone rồi tạo branch mới
            git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/${PUBLIC_REPO}.git" public_repo 2>/dev/null || {
              # Nếu repo rỗng, init mới
              mkdir public_repo
              cd public_repo
              git init
              git remote add origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${PUBLIC_REPO}.git"
              git checkout -b "$DEPLOY_BRANCH"
              cd ..
            }
          }

          # --- Sync files ---
          # Xóa toàn bộ files cũ trong public repo (trừ .git)
          find public_repo -maxdepth 1 -not -name '.git' -not -name 'public_repo' -not -path 'public_repo' | tail -n +2 | xargs rm -rf 2>/dev/null || true

          # Copy files từ private repo sang, loại trừ .git và .github
          rsync -av --exclude='.git' --exclude='.github' ./ public_repo/

          # --- Commit & Push ---
          cd public_repo
          git add -A

          # Chỉ commit nếu có thay đổi
          if git diff --staged --quiet; then
            echo "✅ Không có thay đổi, skip deploy."
          else
            COMMIT_SHA="${GITHUB_SHA::7}"
            git commit -m "🚀 Deploy from private repo @ ${COMMIT_SHA}"
            git push origin "$DEPLOY_BRANCH"
            echo "✅ Deploy thành công!"
          fi
